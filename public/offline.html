<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EcoDefill - Offline</title>
    <style>
        :root {
            --primary: #10b981;
            --zinc-900: #18181b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--zinc-900);
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('./images/pdm-building.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        
        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #34d399, #10b981, #059669);
            border-radius: 4px 4px 0 0;
        }
        
        .logo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            position: relative;
        }
        
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }
        
        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 32px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(to right, #059669, #10b981);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: transform 0.2s, opacity 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .icon {
            margin-bottom: 12px;
            font-size: 24px;
            color: #fbbf24;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .spinner {
            display: inline-block;
        }
        .loading .btn-text {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="./images/pdm-logo.png" alt="EcoDefill">
        </div>
        
        <h1>Connection Lost</h1>
        <p>You're currently offline. Please check your internet connection and try again to access EcoDefill.</p>
        
        <button class="btn" id="retry-btn">
            <div class="spinner"></div>
            <span class="btn-text">Try Reconnecting</span>
        </button>
    </div>

    <script>
        // The app URL - when we navigate here, Capacitor's WebView loads the app natively
        const APP_URL = 'https://eco-defill.vercel.app';
        const btn = document.getElementById('retry-btn');
        let isRetrying = false;

        function tryReconnect() {
            if (isRetrying) return;
            isRetrying = true;
            btn.classList.add('loading');
            
            // Navigate to the app URL inside the WebView (not the browser)
            // This is the key fix - reload() stays on offline.html, 
            // but location.href goes to the app
            setTimeout(() => {
                window.location.href = APP_URL;
            }, 500);
        }

        btn.addEventListener('click', tryReconnect);

        // Auto-reconnect as soon as internet returns
        window.addEventListener('online', () => {
            tryReconnect();
        });

        // Also check periodically (for captive portals that don't fire 'online')
        setInterval(() => {
            if (navigator.onLine && !isRetrying) {
                tryReconnect();
            }
        }, 8000);
    </script>
</body>
</html>
