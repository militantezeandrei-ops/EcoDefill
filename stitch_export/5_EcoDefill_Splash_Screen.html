<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoDefill Splash Screen</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#2f7f33",
                "secondary": "#1565C0",
                "background-light": "#f6f8f6",
                "background-dark": "#141e15",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display h-screen w-full flex flex-col justify-between overflow-hidden">
<!-- Top Spacer for Status Bar balance -->
<div class="h-16 w-full"></div>
<!-- Main Content Area: Logo and Branding -->
<div class="flex-1 flex flex-col items-center justify-center p-8 animate-fade-in">
<!-- Logo Container -->
<div class="relative w-48 h-48 mb-6 flex items-center justify-center">
<!-- Abstract representation of the logo based on description: Green leaf and water droplet -->
<div class="w-full h-full bg-center bg-no-repeat bg-contain" data-alt="EcoDefill logo showing green leaf and blue water droplet" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDDrFOuaLaPru0jfVXC1_iw4ongfFe-nf-Jk5wac6oD5qF2uE0GkF2qy1P7kBcoyrqq_sdU_ebxd3-NozyCcjs1PYWlKn5xeB1b5c4TERvVveKtqJ107eKLAkISHok2dH5b6UIyjsvsAyaGrRssxJukFsggNB7jmPKVzGL0woNr0lO5zLfFwU8fwjpSGi-FufimlwBrpnrThxsUYelNg1Sz19BYOO0fz8HafzV2VW4N6bm_1tr6cU3sqC2KJz5tL6LDzJzFkfbfI4Vm");'>
</div>
</div>
<!-- App Name -->
<h1 class="text-primary dark:text-primary text-4xl font-black tracking-tight mb-2 text-center">
            EcoDefill
        </h1>
<!-- Tagline -->
<p class="text-slate-600 dark:text-slate-300 text-lg font-medium tracking-wide text-center">
            Recycle. Earn. Refill.
        </p>
</div>
<!-- Bottom Section: Loading and Footer -->
<div class="w-full max-w-xs mx-auto pb-12 px-6 flex flex-col gap-6">
<!-- Loading Bar Component -->
<div class="flex flex-col gap-2 w-full">
<div class="flex justify-between items-center px-1">
<span class="text-xs font-semibold text-primary/80 uppercase tracking-wider">Loading</span>
<span class="text-xs font-bold text-primary">100%</span>
</div>
<!-- Progress Bar Background -->
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
<!-- Progress Bar Fill -->
<div class="h-full bg-gradient-to-r from-primary to-secondary rounded-full w-full" style="width: 100%;"></div>
</div>
</div>
<!-- Footer Text -->
<div class="text-center">
<p class="text-slate-400 dark:text-slate-500 text-xs">Pambayang Dalubhasaan ng Marilao</p>
</div>
</div>
</body></html>
